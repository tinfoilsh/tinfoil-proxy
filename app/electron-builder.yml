appId: sh.tinfoil.proxy
productName: Tinfoil Proxy
directories:
  buildResources: assets
  output: dist
files:
  - out/**
  - package.json
  - "!**/{.eslintrc,.eslintignore,.prettierrc,tsconfig*.json}"
extraMetadata:
  main: out/main/index.js
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  - from: assets
    to: assets
    filter:
      - icon-tray*.png
mac:
  category: public.app-category.developer-tools
  target:
    - target: pkg
      arch:
        - x64
        - arm64
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: Tinfoil-Proxy-${arch}.${ext}
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  extendInfo:
    LSUIElement: true
    NSHumanReadableCopyright: Copyright © Tinfoil Systems
publish:
  - provider: github
    owner: tinfoilsh
    repo: tinfoil-proxy
    releaseType: release
dmg:
  background: assets/dmg-background.png
  window:
    width: 540
    height: 380
  iconSize: 96
  iconTextSize: 13
  contents:
    - x: 135
      y: 175
      type: file
    - x: 405
      y: 175
      type: link
      path: /Applications
pkg:
  installLocation: /Applications
  allowAnywhere: false
  allowCurrentUserHome: false
  allowRootDirectory: true
  isRelocatable: false
  isVersionChecked: true
  hasStrictIdentifier: true
  overwriteAction: upgrade
  scripts: build/pkg-scripts
linux:
  target:
    - target: deb
      arch:
        - x64
  category: Network
  icon: assets/icon.png
deb:
  artifactName: tinfoil-proxy_${arch}.${ext}
  depends:
    - libayatana-appindicator3-1 | libappindicator3-1
    - libgtk-3-0t64 | libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0t64 | libatspi2.0-0
    - libuuid1
    - libsecret-1-0
win:
  target:
    - nsis
  icon: assets/icon.png
nsis:
  artifactName: Tinfoil-Proxy-Setup.${ext}
